name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_NETWORK: SANDBOX
  NEXT_PUBLIC_HORIZON_URL: http://localhost:8000
  NEXT_PUBLIC_SOROBAN_RPC_URL: http://localhost:8000/soroban/rpc
  NEXT_PUBLIC_FRIENDBOT_URL: http://localhost:8000/friendbot

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      stellar:
        image: stellar/quickstart:testing
        env:
          ENABLE_SOROBAN_RPC: yes
        options: "--platform linux/amd64"
        ports:
          - "8000:8000"
        command: ["--standalone"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: chmod +x sandbox/scripts/seed-sandbox.sh && bash sandbox/scripts/seed-sandbox.sh
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
